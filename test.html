<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚轮缩放 + 自由拖拽 (子元素小于父容器也可平移·初始居中)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 防止拖拽时选中文本/元素 */
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e2b3c;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            text-align: center;
            color: #cdd9e6;
        }

        .container h3 {
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .container h3 kbd {
            background: #2e3d4f;
            padding: 4px 8px;
            border-radius: 6px;
            color: #b7e1fa;
            font-size: 0.9em;
        }

        /* 固定尺寸的父容器 */
        #parent {
            position: relative;
            width: 600px;
            height: 400px;
            background: #2c3e4f;
            border: 3px solid #405b73;
            border-radius: 16px;
            overflow: hidden;          /* 关键：隐藏超出部分 */
            box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.6);
            cursor: grab;
            margin: 0 auto;
        }

        /* 当正在拖拽时改变光标样式 (由JS添加类) */
        #parent.dragging {
            cursor: grabbing;
        }

        /* 子元素：绝对定位，左上角为基准，可缩放平移 */
        #child {
            position: absolute;
            left: 0;
            top: 0;
            width: 550px;              /* 原始宽度 (稍小于父容器，便于演示从小放大) */
            height: 320px;              /* 原始高度 */
            background: radial-gradient(circle at 30% 30%, #f7cf9a, #e8b37e);
            border-radius: 24px;
            box-shadow: 0 10px 18px rgba(0,0,0,0.3);
            transform-origin: 0 0;       /* 左上角为变换原点，方便计算偏移 */
            will-change: transform;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #2d1f0c;
            font-weight: bold;
            padding: 20px;
            box-sizing: border-box;
            /* 增加一些内部细节，体现缩放/拖拽效果 */
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255,255,255,0.2) 25%, transparent 25%);
            background-size: 40px 40px;
        }

        /* 子元素里的装饰方块，丰富视觉 */
        .child-content {
            text-align: center;
            background: rgba(0,0,0,0.15);
            padding: 20px 30px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            border: 2px dashed #a8642c;
            box-shadow: inset 0 2px 8px rgba(255,215,140,0.6);
        }

        .child-content p {
            font-size: 1.2rem;
            margin-top: 8px;
            font-weight: normal;
            color: #3b280f;
        }

        /* 状态小提示 (当前缩放比) */
        .info-panel {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 1rem;
            background: #26394b;
            padding: 10px 20px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #52738c;
        }

        .info-panel span {
            color: #ffd78c;
            font-weight: 600;
        }

        button {
            background: #3f5e7a;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #6a8daf;
            transition: all 0.2s;
        }

        button:hover {
            background: #547ea0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>🖱️ 滚轮缩放 · 按住左键拖拽浏览 <kbd>（始终可平移，初始居中）</kbd></h3>
        <div id="parent">
            <div id="child">
                <div class="child-content">
                    🗺️ 可缩放区域
                    <p>⬅️ ➡️ 拖拽移动 (小于父容器也能拖)</p>
                    <p style="font-size:0.9rem; opacity:0.8;">(原始尺寸 550x320)</p>
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div>缩放比例: <span id="scaleDisplay">1.00</span> x</div>
            <div>子元素视觉: <span id="sizeDisplay">550x320</span></div>
            <button id="resetBtn">↺ 重置 (居中)</button>
        </div>
        <p style="margin-top: 12px; font-size: 0.9rem; opacity: 0.7;">👇 现在即使子元素小于父容器，也可自由拖拽，且不会移出边界</p>
    </div>
    <script>
        (function() {
            // ----- 获取元素 -----
            const parent = document.getElementById('parent');
            const child = document.getElementById('child');
            const scaleSpan = document.getElementById('scaleDisplay');
            const sizeSpan = document.getElementById('sizeDisplay');
            const resetBtn = document.getElementById('resetBtn');

            // ----- 状态变量 -----
            let scale = 1.0;                // 当前缩放系数
            let translateX = 0;              // 当前X偏移 (px)
            let translateY = 0;              // 当前Y偏移 (px)

            // 原始尺寸 (基于子元素布局宽度/高度, 不受transform影响)
            let baseWidth = child.offsetWidth;   // 550
            let baseHeight = child.offsetHeight; // 320

            // 父容器固定尺寸 (可视区域)
            const parentWidth = parent.clientWidth;   // 600
            const parentHeight = parent.clientHeight; // 400

            // 缩放范围限制
            const MIN_SCALE = 0.3;
            const MAX_SCALE = 4.0;

            // 拖拽状态
            let isDragging = false;
            let dragStartX = 0, dragStartY = 0;      // 鼠标按下时的页面坐标 (client)
            let startTranslateX = 0, startTranslateY = 0; // 按下时的偏移量

            // ----- 辅助函数：更新子元素的 transform 和 UI 信息 -----
            function updateTransform() {
                child.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                // 更新显示信息
                scaleSpan.textContent = scale.toFixed(2);
                const visualW = (baseWidth * scale).toFixed(1);
                const visualH = (baseHeight * scale).toFixed(1);
                sizeSpan.textContent = `${visualW} x ${visualH}`;
            }

            // ----- 统一边界钳位函数 (支持子元素小于/大于父容器) -----
            function clampTranslation() {
                // 重新获取原始尺寸 (以防子元素内容动态变化, 但本例静态)
                baseWidth = child.offsetWidth;
                baseHeight = child.offsetHeight;

                const visualW = baseWidth * scale;
                const visualH = baseHeight * scale;

                // 使用统一公式计算允许的平移范围
                // 对于X轴: minX = min(0, parentWidth - visualW) , maxX = max(0, parentWidth - visualW)
                // 这样当 visualW <= parentWidth 时, minX=0, maxX=正数; 当 visualW > parentWidth 时, minX=负数, maxX=0
                const minX = Math.min(0, parentWidth - visualW);
                const maxX = Math.max(0, parentWidth - visualW);
                translateX = Math.min(maxX, Math.max(minX, translateX));

                const minY = Math.min(0, parentHeight - visualH);
                const maxY = Math.max(0, parentHeight - visualH);
                translateY = Math.min(maxY, Math.max(minY, translateY));
            }

            // ----- 整合更新：先钳位，再更新视图 -----
            function applyTransform() {
                clampTranslation();   // 确保边界
                updateTransform();
            }

            // ----- 设置初始居中对齐 -----
            function setCentered() {
                scale = 1.0;
                baseWidth = child.offsetWidth;   // 550
                baseHeight = child.offsetHeight; // 320
                // 计算居中偏移
                translateX = (parentWidth - baseWidth * scale) / 2;
                translateY = (parentHeight - baseHeight * scale) / 2;
                // 应用边界限制 (对于小尺寸, 这个偏移在范围内; 如果恰好等于父容器, 偏移为0)
                applyTransform(); // 内部会clamp并更新
            }

            // ----- 滚轮缩放 (基于鼠标位置) -----
            function handleWheel(e) {
                e.preventDefault();  // 防止页面滚动

                // 获取鼠标相对于父容器左上角的坐标
                const rect = parent.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                // 限制鼠标坐标不能超出父容器边界
                const boundedMouseX = Math.min(parentWidth, Math.max(0, mouseX));
                const boundedMouseY = Math.min(parentHeight, Math.max(0, mouseY));

                // 缩放因子 (向下滚动缩小, 向上滚动放大)
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                let newScale = scale * delta;
                newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));

                if (newScale === scale) return;

                // 基于鼠标位置调整偏移 (保持鼠标下方的点不变)
                const ratio = newScale / scale;
                let newTx = boundedMouseX - (boundedMouseX - translateX) * ratio;
                let newTy = boundedMouseY - (boundedMouseY - translateY) * ratio;

                scale = newScale;
                translateX = newTx;
                translateY = newTy;

                applyTransform(); // 钳位 + 更新
            }

            // ----- 拖拽功能 (左键) -----
            function handleMouseDown(e) {
                if (e.button !== 0) return; // 仅左键
                e.preventDefault();

                dragStartX = e.clientX;
                dragStartY = e.clientY;
                startTranslateX = translateX;
                startTranslateY = translateY;

                parent.classList.add('dragging');
                isDragging = true;

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
            }

            function handleMouseMove(e) {
                if (!isDragging) return;
                e.preventDefault();

                const dx = e.clientX - dragStartX;
                const dy = e.clientY - dragStartY;

                translateX = startTranslateX + dx;
                translateY = startTranslateY + dy;

                applyTransform(); // 钳位 + 更新
            }

            function handleMouseUp(e) {
                if (!isDragging) return;
                // 左键释放结束拖拽 (任何按键弹起都结束)
                e.preventDefault();

                window.removeEventListener('mousemove', handleMouseMove);
                window.removeEventListener('mouseup', handleMouseUp);
                parent.classList.remove('dragging');
                isDragging = false;
            }

            // ----- 重置到居中 (scale=1, 居中) -----
            function resetView() {
                setCentered(); // 复用居中对齐函数
            }

            // ----- 事件绑定 -----
            parent.addEventListener('wheel', handleWheel, { passive: false });
            parent.addEventListener('mousedown', handleMouseDown);
            parent.addEventListener('contextmenu', (e) => e.preventDefault()); // 禁用右键菜单

            // 重置按钮
            resetBtn.addEventListener('click', resetView);

            // 初始化：子元素居中
            setCentered();

            // 注意：由于使用了统一钳位函数，现在无论子元素比父容器大还是小，
            // 拖拽都能在合理范围内移动，且不会移出父容器边界。
            // 当子元素小于父容器时，可平移范围是让子元素在父容器内完全可见地滑动；
            // 当子元素大于父容器时，可平移范围是让子元素边缘对齐父容器边缘，无法露出背景。
        })();
    </script>
</body>
</html>
